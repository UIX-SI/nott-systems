name: Deploy to GitHub Pages

# nott — GitHub Pages 자동 배포
# main 브랜치에 push 되면 Vite build 후 Pages로 배포합니다.
# 결과 URL: https://nott.systems/  (custom domain, base /)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # cache 옵션은 package-lock.json 이 있어야 동작합니다.
      # 처음 한두 번은 lockfile 없이도 빌드되도록 cache를 끄고,
      # lockfile을 커밋한 다음부터 캐시를 켜는 편이 안전합니다.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # custom domain nott.systems serves at root → base must be "/"
          NOTT_BASE: "/"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
